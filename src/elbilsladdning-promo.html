<style>
.elpromo-wrap {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  max-width: 560px;
  margin: 32px auto;
}

.elpromo-card {
  background: linear-gradient(135deg, #1a3a5c 0%, #2d1b69 100%);
  border-radius: 20px;
  padding: 32px 28px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(29,70,120,0.28);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.elpromo-card::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 180px; height: 180px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
  pointer-events: none;
}
.elpromo-card::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -40px;
  width: 140px; height: 140px;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
  pointer-events: none;
}

.elpromo-top {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
}

.elpromo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px; height: 48px;
  background: rgba(255,255,255,0.12);
  border-radius: 14px;
  flex-shrink: 0;
  backdrop-filter: blur(4px);
}

.elpromo-titles {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.elpromo-eyebrow {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #6ee7b7;
}

.elpromo-title {
  font-size: 1.25rem;
  font-weight: 800;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -0.01em;
  margin: 0;
}

.elpromo-body {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.78);
  line-height: 1.55;
  position: relative;
}

.elpromo-pills {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  position: relative;
}

.elpromo-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  border: 1px solid rgba(255,255,255,0.15);
}
.elpromo-pill.el      { background: rgba(16,185,129,0.25); color: #6ee7b7; }
.elpromo-pill.bensin  { background: rgba(59,130,246,0.25); color: #93c5fd; }
.elpromo-pill.diesel  { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.82); }

.elpromo-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 22px;
  background: #fff;
  color: #1e2a3a;
  border-radius: 12px;
  font-size: 0.92rem;
  font-weight: 700;
  text-decoration: none;
  letter-spacing: 0.01em;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  transition: transform 0.15s, box-shadow 0.15s;
  align-self: flex-start;
  position: relative;
}
.elpromo-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.22);
  text-decoration: none;
  color: #1e2a3a;
}
.elpromo-btn:active {
  transform: translateY(0);
}
.elpromo-btn svg {
  flex-shrink: 0;
  color: #3b82f6;
}

.elpromo-member-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 13px;
  background: rgba(16,185,129,0.18);
  border: 1px solid rgba(110,231,183,0.35);
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #6ee7b7;
  align-self: flex-start;
  position: relative;
}
</style>

<div class="elpromo-wrap">
  <div class="elpromo-card">

    <div class="elpromo-top">
      <div class="elpromo-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 22V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16"/><path d="M3 10h12"/><path d="M15 6h2a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><line x1="3" y1="22" x2="21" y2="22"/>
        </svg>
      </div>
      <div class="elpromo-titles">
        <span class="elpromo-eyebrow">Kalkylator</span>
        <p class="elpromo-title">Vad kostar din resa i bränsle?</p>
      </div>
    </div>

    <div class="elpromo-member-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Ingår i din prenumeration
    </div>

    <p class="elpromo-body">
      Som prenumerant har du tillgång till vår kalkylator för resekostnader. Ange start och destination så hämtas sträckan automatiskt — för el, bensin och diesel.
    </p>

    <div class="elpromo-pills">
      <span class="elpromo-pill el">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        Elbil
      </span>
      <span class="elpromo-pill bensin">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v16"/><path d="M3 10h12"/><path d="M15 6h2a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><line x1="3" y1="22" x2="21" y2="22"/></svg>
        Bensin
      </span>
      <span class="elpromo-pill diesel">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
        Diesel
      </span>
    </div>

    <a class="elpromo-btn" href="https://elitrobban.se/branslekostnad-berakning/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Räkna ut resekostnaden
    </a>

  </div>
</div>
